<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(255, 214, 102, 0.45), transparent 32rem),
        linear-gradient(135deg, #f7fbff 0%, #eef6f1 48%, #fff7ed 100%);
    }

    main {
      width: min(92vw, 520px);
      padding: 34px 26px;
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 41, 55, 0.08);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 40px);
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: #64748b;
      line-height: 1.5;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      min-height: 68px;
      margin: 0 0 18px;
    }

    .ball {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      background: #fde047;
      box-shadow: inset 0 -7px 12px rgba(0, 0, 0, 0.12), 0 7px 16px rgba(15, 23, 42, 0.12);
    }

    .bonus {
      margin: 0 0 28px;
      min-height: 30px;
      color: #475569;
      font-weight: 700;
    }

    .bonus .ball {
      width: 34px;
      height: 34px;
      display: inline-grid;
      margin-left: 8px;
      font-size: 16px;
      vertical-align: middle;
      background: #93c5fd;
    }

    button {
      width: min(100%, 260px);
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #2563eb;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 5px 12px rgba(37, 99, 235, 0.24);
    }
  </style>
</head>
<body>
  <main>
    <h1>로또 번호 생성기</h1>
    <p>버튼을 누르면 1부터 45까지 중복 없는 번호가 생성됩니다.</p>

    <div class="numbers" id="numbers" aria-live="polite"></div>
    <div class="bonus" id="bonus" aria-live="polite">행운의 번호를 만들어보세요.</div>

    <button type="button" id="generateButton">번호 만들기</button>
  </main>

  <script>
    const numbersElement = document.getElementById("numbers");
    const bonusElement = document.getElementById("bonus");
    const generateButton = document.getElementById("generateButton");

    function drawLottoNumbers() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);

      for (let i = pool.length - 1; i > 0; i -= 1) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[randomIndex]] = [pool[randomIndex], pool[i]];
      }

      const winningNumbers = pool.slice(0, 6).sort((a, b) => a - b);
      const bonusNumber = pool[6];

      numbersElement.innerHTML = winningNumbers
        .map((number) => `<span class="ball">${number}</span>`)
        .join("");

      bonusElement.innerHTML = `보너스 번호 <span class="ball">${bonusNumber}</span>`;
    }

    generateButton.addEventListener("click", drawLottoNumbers);
  </script>
</body>
</html>
