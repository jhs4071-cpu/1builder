<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: light;
      --page-text: #1f2937;
      --page-background:
        radial-gradient(circle at top left, rgba(255, 214, 102, 0.45), transparent 32rem),
        linear-gradient(135deg, #f7fbff 0%, #eef6f1 48%, #fff7ed 100%);
      --panel-background: rgba(255, 255, 255, 0.92);
      --panel-border: rgba(31, 41, 55, 0.08);
      --panel-shadow: rgba(31, 41, 55, 0.12);
      --muted-text: #64748b;
      --bonus-text: #475569;
      --ball-text: #111827;
      --main-ball: #fde047;
      --bonus-ball: #93c5fd;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-shadow: rgba(37, 99, 235, 0.28);
      --secondary-background: #f8fafc;
      --secondary-text: #334155;
      --secondary-border: #cbd5e1;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --page-text: #e5e7eb;
      --page-background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.2), transparent 30rem),
        linear-gradient(135deg, #0f172a 0%, #111827 52%, #1e1b4b 100%);
      --panel-background: rgba(15, 23, 42, 0.92);
      --panel-border: rgba(226, 232, 240, 0.16);
      --panel-shadow: rgba(0, 0, 0, 0.34);
      --muted-text: #cbd5e1;
      --bonus-text: #d1d5db;
      --ball-text: #111827;
      --main-ball: #facc15;
      --bonus-ball: #60a5fa;
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --primary-shadow: rgba(59, 130, 246, 0.32);
      --secondary-background: #1e293b;
      --secondary-text: #e2e8f0;
      --secondary-border: #475569;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: var(--page-text);
      background: var(--page-background);
      transition: color 0.2s ease, background 0.2s ease;
    }

    main {
      width: min(92vw, 520px);
      padding: 34px 26px;
      text-align: center;
      background: var(--panel-background);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 18px 45px var(--panel-shadow);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 40px);
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted-text);
      line-height: 1.5;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      min-height: 68px;
      margin: 0 0 18px;
    }

    .ball {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 22px;
      font-weight: 700;
      color: var(--ball-text);
      background: var(--main-ball);
      box-shadow: inset 0 -7px 12px rgba(0, 0, 0, 0.12), 0 7px 16px rgba(15, 23, 42, 0.12);
    }

    .bonus {
      margin: 0 0 28px;
      min-height: 30px;
      color: var(--bonus-text);
      font-weight: 700;
    }

    .bonus .ball {
      width: 34px;
      height: 34px;
      display: inline-grid;
      margin-left: 8px;
      font-size: 16px;
      vertical-align: middle;
      background: var(--bonus-ball);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    button {
      width: min(100%, 260px);
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: var(--primary);
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 22px var(--primary-shadow);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 5px 12px rgba(37, 99, 235, 0.24);
    }

    .theme-button {
      width: min(100%, 170px);
      color: var(--secondary-text);
      background: var(--secondary-background);
      border: 1px solid var(--secondary-border);
      box-shadow: none;
    }

    .theme-button:hover {
      background: var(--secondary-background);
    }
  </style>
</head>
<body>
  <main>
    <h1>로또 번호 생성기</h1>
    <p>버튼을 누르면 1부터 45까지 중복 없는 번호가 생성됩니다.</p>

    <div class="numbers" id="numbers" aria-live="polite"></div>
    <div class="bonus" id="bonus" aria-live="polite">행운의 번호를 만들어보세요.</div>

    <div class="actions">
      <button type="button" id="generateButton">번호 만들기</button>
      <button type="button" class="theme-button" id="themeButton" aria-pressed="false">다크 모드</button>
    </div>
  </main>

  <script>
    const numbersElement = document.getElementById("numbers");
    const bonusElement = document.getElementById("bonus");
    const generateButton = document.getElementById("generateButton");
    const themeButton = document.getElementById("themeButton");

    function setTheme(theme) {
      const isDark = theme === "dark";

      document.body.dataset.theme = theme;
      themeButton.textContent = isDark ? "화이트 모드" : "다크 모드";
      themeButton.setAttribute("aria-pressed", String(isDark));
      localStorage.setItem("lotto-theme", theme);
    }

    function drawLottoNumbers() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);

      for (let i = pool.length - 1; i > 0; i -= 1) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[randomIndex]] = [pool[randomIndex], pool[i]];
      }

      const winningNumbers = pool.slice(0, 6).sort((a, b) => a - b);
      const bonusNumber = pool[6];

      numbersElement.innerHTML = winningNumbers
        .map((number) => `<span class="ball">${number}</span>`)
        .join("");

      bonusElement.innerHTML = `보너스 번호 <span class="ball">${bonusNumber}</span>`;
    }

    generateButton.addEventListener("click", drawLottoNumbers);
    themeButton.addEventListener("click", () => {
      const nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
      setTheme(nextTheme);
    });

    setTheme(localStorage.getItem("lotto-theme") || "light");
  </script>
</body>
</html>
